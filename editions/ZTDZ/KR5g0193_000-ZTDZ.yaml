body:
  text: 上清太一帝君太丹隱書解胞十二結節圖訣夫人生由胞胎以自變禀血精以自成故旣生而胞胎更結旣成而血液不留不留者帝君混合則已留住之矣胞胎有十二結節盤固五内五内滯礙結不可解節不可除故人之病也由節滯也人之死也由結固也常以本命日若八節日上請帝君與太一混合約制百神而解胞中牢堅之結盤根之死節也胞有十二結内又有十二節節在結内人不知解胞結節者亦不免死矣𢘆解之者長生胞上結一在泥丸中二在口中三在頰中四在目中此胞之四結在上部胞中結一在五藏中二在太倉中三在大腸中四在小腸中此胞之四結在中部胞下結一在膀胱中二在隂中三在後門中四在兩足中此胞之四結在下部解結之法入室閉戸存思先讀帝君以下百神名字再過畢乃按次解結此法是帝君太一混合二十四神解結除尸氣之道也兆以本命日若八節日日中夜半時任意也正坐向本命之方接手端心叩齒二十四通曰男生某甲上啓胞父胞母始生之日三積留血化爲十二大結今本命之日謹請三九之神二十四眞人解三關十二結請言所召東方青帝雕梁際字青平五方五帝隨方色取冝設色南方赤帝長来覺字南和西方白帝彰安幸字西華北方黒帝保成昌字北伐玄一老子林虚夫字靈時道服緑已下眼色依註說餘並取冝設色三素老君牢張上字生道服素正一左仙人仲成子一名帝賔字四華服紫正一右仙人曲又子一名光賢字靈和淺紅服太微小童干景精字㑹元子一名三衿交一名對帝真絳服上胎内眞等有九人外合九氣是爲九君爲甲上解結結在上關四結解散津血流源長上生籍永爲帝仙太一尊神務猶收字歸㑹昌一名鮮明一名寄頻服深紫右無英公子玄元叔字合符子一名元素君一名神公子淺紅服右白元洞陽君鬱靈摽字玄夷絶一名朱精一名啓成絳服中央司命丈人君理明𥘉字玄度卿一名神宗一名靈華服紫命門挑君孩道康字合精廷一名命王一名胞根淺紅服泥丸天帝君上一赤子玄凝天字三元先一名伯无上一名伯史華降服泥丸天帝卿肇勒精字中玄生一名起非一名常扶服紫絳宫心丹田宫中元丹皇君神運珠字子南丹一名生上伯一名史雲拘浅絳服絳宫輔皇中一卿中光堅字四化靈一名幽車伯一名董史華絳服中胎丸眞是爲九君廻靈九氣化入絳宫五藏大結大腸小腸皆當化散四結分昌中關調利流注太倉千災萬禍一時滅亡記上生録永無災殃命門下一黄庭元王始明精字元陽昌一名嬰見胎二名伯史原服紫黄庭保鎭弼卿歸上明字谷下玄一名承申伯一名承光生赤黄服第一胎巾白氣君務玄子字育尚生素服第二結中青氣君案延昌字合和嬰服青第三節中黒氣君斌來生字精上門服皂第四胞中黄氣君祖明車字神無極服黄第五血中赤氣君混離子字叔保堅絳服第六上玄元父君髙同生字左廻明淺紫服第七下玄玄毋君叔火王字右廻光絳服下胎九君胞胎内眞生化九氣是爲九魂九魂精結胞中節堅使甲不夀中年隕顛今日本命如往初生乞得解散十二死根名上玉籍五符入身下鎭九氣永得纒綿上開九宫下開九關禮讀再過都畢當和心下氣勿今音輟而蹇也又閉目存呼太極紫房天皇大帝君逢凌梵字履昌靈一名七靈一名神丈人如此祝之三又存三九結解眞君東方青帝雕梁際等下詣玄母叔火王等二十七人同著朱衣黄巾黄巾者似逺遊冠之狀也貌如嬰兒有無長短若兆不能諳識一二存念者可入室按文施行之已後山色雲炁人物並取冝設色次引太極紫房並北靣對太帝君而各長跪其言曰上關雕梁際等九人中關太一務猶收等九人下關下一黄庭始明精等九人三九二十七人即日縁氣内咽上開三關關有二十四結結有二十四筋筋即已斷結巳解散津血上衝徑滿泥丸玉液下順哺養百神即日某甲名上帝籍長生神仙畢又存太一召兆上詣帝君前帝君曰胞結已通光内徹外使爾長生命不傾墜汝可合我形中矣帝君因開口覺我忽入帝君口中徑到帝君六合宫中帝君六合宫中又有太上神名重冥空字幽寥無因告兆曰可食日精矣兆即取日精食之作九咽止須㬰見向二十七眞人皆在兆左右立二十七眞人曰某甲胎籍已解穢氣皆除面巳玉澤體洞太虚長生億萬帝君同符又存帝君祝曰天上同眞是甲之身天上同靈是甲之形良乆都畢也此爲九君混合内化百神解胞散結開利三關上符六合併景帝君變化命籍氣鎭泥丸長生受符方爲天仙者也存思都畢乃更散髪更梳頭解衣更結衣洗手足帝君泥丸中又有六合宫宫中有帝皇太一君名重冥空字幽寥無兆知之者朽骨更生五藏生華終身不畏怖畏怖之時北向呼此名三過祝曰羅阿重冥空雷風幽寥無上生帝君形祐兆使無憂畢如與千人同侣太一曰人有三魂利人之存人有七魄害人之命七魄朝在人左目下暮在鼻人中下學道者欲卧先以右手爪按左目下及人中各三七過甚佳此制七魄之道也帝君曰太一寳玄玉經太上眞人藏於五嶽華房之内非有仙籍者不得聞見此也見之者生行之者仙是故重爲盟誓束其天眞以防宣泄流布離行耳自天尊貴仙幽祕此道非仙骨者不授也無至誠者不聞也故經曰師受者禮焉經之傳也從師而受受經而用弟子道也傳授之際各齋七日或十日先後又曰告齋各復八日也古者盟誓皆㰱血斷髪立壇告天以爲不宣示信之約也今自可以金青絲之陳以代髪膚之體耳列於別靖祝啓上皇法用金鐶三枚鮮明赤而有光者青繒九尺以代三契之盟亦可相連爲二十七尺耳受經當寫爲兩通修一几一也盟物僃録不得𥝠用以自營也故太上中經曰夫師因經業故稱之曰生受者習焉以同其誠推盟誓天固神告靈纒綿憂樂義齊死生於是始驗尅終俱期仙庭者矣爾乃束拜諮受修盟曲室尊早以顯三契分别孜孜之心寳經藏宻施行要言誠存專一保敬師經方寸敢怠如此始可與言神靈之交道徳之契矣奉經而袐其道行事而遵其誓則上以刋名於玉簡書帝録於太極若違其道也則七祖受風刀之考玄母受胎零之害身爲下鬼門亦堙滅摙蒙山之石以投積夜之河悲夫有心之子其愼祕也哉此太上眞人契令張天師演出於丹景經中有是愼盟之書也受太上帝君之道用事如此故記而施行焉金鐶三枚盟三元之誓也青繒二十七尺䌝帛也盟帝君二十四神之誓也赤絲五兩以盟五神公子之誓也和香二褁以爲告靈交氣之因也筆一枝紙一百丹一兩書盟也右五種以物器盛之不宣露也皆受經者具也弟子寫畢乃齎經及信來詣師室而受經受經畢乃得施用耳不盟受而竊行之者按女青詔書失兩明也受而不行者有天災考也行而宣泄者有風刀災考也傳非其人七世父毋受其考也此玄都鬼律女青詔書之㫖上清太一帝君太丹隱書解胞十二結節圖訣
